<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories Collection</title>

<style>
body { font-family: Arial, sans-serif; margin:20px; }

/* NEW CENTER BUTTON */
.center-btn-container {
    display:flex;
    justify-content:center;
    margin-top:80px;
}
.ethereal-btn{
    padding:25px 60px;
    font-size:24px;
    font-weight:bold;
    color:#fff;
    background:linear-gradient(145deg,#9c27b0,#3f51b5);
    border:none;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* IMAGE OVERLAY */
.overlay {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70%;
    margin:20px;
    display:none;
    z-index:999;
}
.overlay img{
    width:100%;
    border-radius:12px;
}

/* AUDIO PROGRESS */
.audio-box{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    display:none;
}
</style>
</head>

<body>

<h2>A Naughty Storys</h2>

<div class="center-btn-container">
    <button class="ethereal-btn" onclick="playAudio()">Unraveling Integrity</button>
</div>

<div class="center-btn-container">
    <button class="ethereal-btn" onclick="playAudio()">Professor Dominant</button>
</div>
<!-- IMAGE -->
<div class="overlay" id="overlay">
    <img src="angel.jpg">
</div>

<!-- AUDIO -->
<div class="audio-box" id="audioBox">
    <audio id="audio" controls>
        <source src="story.mp3" type="audio/mpeg">
    </audio>
</div>
<div class="audio-box" id="audioBox">
    <audio id="audio" controls>
        <source src="story1.mp3" type="audio/mpeg">
    </audio>
</div>
<script>
function playAudio(){
    const audio = document.getElementById('audio');
    const overlay = document.getElementById('overlay');
    const box = document.getElementById('audioBox');

    overlay.style.display = "block";
    box.style.display = "block";

    audio.play();
}
</script>

</body>
</html>
